<aside>
  <h3>Dica para você</h3>
  <p>
    Ter um site próprio aumenta a credibilidade, amplia a divulgação
    e facilita o contato com clientes.
  </p>
</aside>

<section id="cadastro-empreendedor">
<h2>Cadastrar Meu Negócio</h2>
  <p>Registre o seu comércio de lanches, doces ou refeições em nosso guia!</p>

  <form>
    <label for="nome-do-negocio">Nome do Negócio Alimentício:</label>
    <input type="text" id="nome-do-negocio" name="nome-do-negocio" required>

    <label for="tipo-de-comida">Tipo Principal de Comida:</label>
    <select id="tipo-de-comida" name="tipo-de-comida" required>
      <option value="">Selecione...</option>
      <option value="lanches">Lanches e Salgados</option>
      <option value="doces">Doces e Sobremesas</option>
      <option value="refeicoes">Refeições / Marmitas</option>
    </select>

    <label for="horarios">Dias e Horários de Funcionamento:</label>
    <input type="text" id="horarios" name="horarios" placeholder="Ex: Terça a Domingo, das 18h às 23h" required>

    <label for="cardapio-comerciante">Digite seu Cardápio (Produtos e Preços):</label>
    <textarea id="cardapio-comerciante" name="cardapio-comerciante" rows="5" placeholder="Ex:
X-Tudo - R$ 15,00
Pastel de Frango - R$ 12,00" required></textarea>

    <button type="submit">Cadastrar Negócio</button>

  </form>
</section>
